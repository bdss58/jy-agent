# SearxNG configuration overrides.
#
# `use_default_settings: true` makes SearxNG inherit everything from the
# upstream default settings.yml baked into the searxng/searxng image
# (/usr/local/searxng/searx/settings.yml). Only the keys we set below are
# overridden. Keeps this file tiny and avoids drifting from upstream.
#
# Docs: https://docs.searxng.org/admin/settings/settings.html#use-default-settings
#
# Inspect the effective merged config:
#   docker exec searxng /usr/local/searxng/.venv/bin/python -c \
#     "from searx import settings; print(settings['search']['formats'])"

use_default_settings: true

general:
  instance_name: "jy-agent searxng"

server:
  # MUST override — upstream default is the placeholder "ultrasecretkey"
  # which SearxNG refuses to run with. Generated 2026-04-25 via
  # `openssl rand -hex 32`. Local-only instance — rotate if exposed.
  secret_key: "be4d05caa5b4d8c01f1b86302f7dc3240485d030e3146f0bd65b035c81b7f541"

search:
  # Default ships [html] only; jy-agent's web_search calls /search?format=json
  # which 403s without `json` here, causing the cascade to fall through to DDG.
  formats:
    - html
    - json

# Route all outbound engine requests through the host's SSH SOCKS5 proxy
# (`ssh -D 1080` on the Mac). The Mac is behind GFW; without this, engines
# like DDG, Wikipedia, Brave, Bing, Startpage all time out and SearxNG
# returns 0 results.
#
# - `host.docker.internal` is Docker Desktop's bridge to the Mac host's
#   loopback — `127.0.0.1:1080` from inside the container would just be
#   the container's own loopback.
# - `socks5h://` (note the `h`) resolves hostnames THROUGH the proxy,
#   bypassing any DNS poisoning on the local network.
# - `httpx_socks` + `python_socks` are already vendored in the upstream
#   searxng/searxng image — no extra install needed.
# - To probe whether the proxy is up from inside the container:
#     docker exec searxng /usr/local/searxng/.venv/bin/python -c \
#       "import socket,struct;s=socket.socket();s.settimeout(3); \
#        s.connect(('host.docker.internal',1080)); \
#        s.sendall(b'\\x05\\x01\\x00');print(s.recv(2).hex())"
#   Expect `0500` (SOCKS5, NOAUTH accepted).
outgoing:
  proxies:
    all://: socks5h://host.docker.internal:1080

engines:
  # `karmasearch` (and its videos variant) are enabled by default but
  # return "access denied" without a registered API key. Disable to stop
  # them polluting `unresponsive_engines` on every query.
  - name: karmasearch
    disabled: true
  - name: karmasearch videos
    disabled: true
